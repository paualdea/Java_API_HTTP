image: maven:3.9.6-eclipse-temurin-21

variables:
  BASE_NAME: "Java_API_HTTP"
  PACKAGE_NAME: "${BASE_NAME}-${CI_COMMIT_REF_NAME}.jar"
  PACKAGE_URL: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/ejecutables/${CI_COMMIT_REF_NAME}/${PACKAGE_NAME}"

stages:
  - build
  - upload
  - release
  - sync_external

job_compilacion:
  stage: build
  script:
    - |
      mvn clean package -DskipTests
      # 1. Buscamos la clase principal
      MAIN_CLASS=$(grep -rl "public static void main" src/main/java | head -n 1 | sed 's|.*src/main/java/||' | sed 's/\.java//' | tr '/' '.')
      echo "Clase principal detectada: $MAIN_CLASS"
      echo "Main-Class: $MAIN_CLASS" > manifest.txt
      jar ufm target/*.jar manifest.txt
      mv target/*.jar $PACKAGE_NAME
  artifacts:
    paths:
      - $PACKAGE_NAME
    expire_in: 1 week

job_upload:
  stage: upload
  image: curlimages/curl:latest
  script:
    - |
      curl --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
           --upload-file ${PACKAGE_NAME} \
           "${PACKAGE_URL}"
  rules:
    - if: $CI_COMMIT_TAG

job_release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  script:
    - |
      release-cli create --name "Release $CI_COMMIT_TAG" --tag-name $CI_COMMIT_TAG \
        --description "Descarga del ejecutable versionado: $PACKAGE_NAME" \
        --assets-link "{\"name\":\"${PACKAGE_NAME}\",\"url\":\"${PACKAGE_URL}\"}"
  rules:
    - if: $CI_COMMIT_TAG

sync_to_github:
  stage: sync_external
  image: alpine:latest
  dependencies:
    - job_compilacion
  before_script:
    - apk add --no-cache git curl jq
    - git config --global --add safe.directory $CI_PROJECT_DIR
    - git config --global user.email "gitlab-ci@example.com"
    - git config --global user.name "GitLab CI"
  script:
    - |
      # 1. Sincronización de código y creación de repo (lo que ya tenías)
      curl -H "Authorization: token $GH_TOKEN" \
           -d "{\"name\": \"$CI_PROJECT_NAME\", \"private\": false}" \
           https://api.github.com/user/repos || true
      
      git remote remove github || true
      git remote add github https://${GH_USER}:${GH_TOKEN}@github.com/${GH_USER}/${CI_PROJECT_NAME}.git
      git push github HEAD:refs/heads/master --force || true
      git push github --tags --force

      # 2. Si es un TAG, crear la Release en GitHub y subir el JAR
      if [ -n "$CI_COMMIT_TAG" ]; then
        echo "Creando Release en GitHub para el tag $CI_COMMIT_TAG..."
      
        # Crear la release y guardar la respuesta para sacar el ID
        RELEASE_JSON=$(curl -s -H "Authorization: token $GH_TOKEN" \
          -d "{\"tag_name\": \"$CI_COMMIT_TAG\", \"name\": \"$CI_COMMIT_TAG\", \"body\": \"Autogenerated release from GitLab CI\"}" \
          "https://api.github.com/repos/${GH_USER}/${CI_PROJECT_NAME}/releases")
      
        RELEASE_ID=$(echo $RELEASE_JSON | jq '.id')
      
        if [ "$RELEASE_ID" != "null" ]; then
          echo "Subiendo $PACKAGE_NAME a la Release de GitHub (ID: $RELEASE_ID)..."
      
          # Subir el archivo .jar como 'asset'
          curl -H "Authorization: token $GH_TOKEN" \
               -H "Content-Type: application/java-archive" \
               --data-binary "@${PACKAGE_NAME}" \
               "https://uploads.github.com/repos/${GH_USER}/${CI_PROJECT_NAME}/releases/${RELEASE_ID}/assets?name=${PACKAGE_NAME}"
      
          echo "¡JAR subido con éxito a GitHub!"
        else
          echo "Error: No se pudo crear la release en GitHub o ya existe."
          echo "Respuesta de GitHub: $RELEASE_JSON"
        fi
      fi
  rules:
    - if: $CI_COMMIT_BRANCH == "master"
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG
